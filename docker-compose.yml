services:
  library-db:
    image: postgres:16-alpine
    container_name: library-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library_db
    ports:
      - "5433:5432"
    volumes:
      - library-db-data:/var/lib/postgresql/data

  loans-db:
    image: postgres:16-alpine
    container_name: loans-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: loans_db
    ports:
      - "5434:5432"
    volumes:
      - loans-db-data:/var/lib/postgresql/data

  library-service:
    build:
      context: ./library-service
      dockerfile: Dockerfile
    container_name: library-service
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@library-db:5432/library_db?schema=public
      JWT_SECRET: local_super_secret_key
      JWT_EXPIRES_IN: 1d
      LOANS_SERVICE_URL: http://loans-service:8080
      INTERNAL_API_KEY: local_internal_key
    depends_on:
      - library-db
      - loans-service

  loans-service:
    build:
      context: ./loans-service
      dockerfile: Dockerfile
    container_name: loans-service
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@loans-db:5432/loans_db?sslmode=disable
      LIBRARY_SERVICE_URL: http://library-service:3000
      INTERNAL_API_KEY: local_internal_key
    depends_on:
      - loans-db

volumes:
  library-db-data:
  loans-db-data: